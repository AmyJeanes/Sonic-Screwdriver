name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - renovate/*
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        description: Publish to the beta workshop item

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: Sonic-Screwdriver

      - name: Checkout TARDIS
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/TARDIS
          ref: main
          path: TARDIS

      - name: Checkout TARDIS-Legacy
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/TARDIS-Legacy
          ref: dev
          path: TARDIS-Legacy

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.2
          path: gmod-addon-tools

      - name: Run glua_check
        working-directory: Sonic-Screwdriver
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('Sonic-Screwdriver/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: Sonic-Screwdriver/results.sarif
          checkout_path: ${{ github.workspace }}/Sonic-Screwdriver
          category: glua_check

  typing-check:
    name: Typing Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: Sonic-Screwdriver

      - name: Checkout TARDIS
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/TARDIS
          ref: main
          path: TARDIS

      - name: Checkout TARDIS-Legacy
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/TARDIS-Legacy
          ref: dev
          path: TARDIS-Legacy

      - name: Checkout wire
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.28.2
          path: gmod-addon-tools

      - name: Run typing check
        working-directory: Sonic-Screwdriver
        shell: pwsh
        run: ./scripts/typing-check.ps1

  publish:
    name: Publish to beta workshop
    needs: [glua-check, typing-check]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.publish == 'true'
    uses: AmyJeanes/gmod-addon-tools/.github/workflows/publish-workshop.yml@2d6fd313362d074b692004942eb3c3ef4597b77a # v0.28.2
    with:
      addon: "Sonic Screwdriver"
      workshop_id: ${{ vars.BETA_WORKSHOP_ID }}
      mfa: false
      dry_run: ${{ vars.BETA_WORKSHOP_ID == '' }}
    secrets:
      STEAM_USERNAME: ${{ vars.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      HA_WEBHOOK_URL: ${{ secrets.HA_WEBHOOK_URL }}
