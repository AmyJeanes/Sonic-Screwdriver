name: CI

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - renovate/*
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: Sonic-Screwdriver

      - name: Checkout TARDIS
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AmyJeanes/TARDIS
          ref: dev
          path: TARDIS

      - name: Checkout TARDIS-Legacy
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AmyJeanes/TARDIS-Legacy
          ref: dev
          path: TARDIS-Legacy

      - name: Checkout wire
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: wiremod/wire
          ref: master
          path: wire

      - name: Run glua_check
        working-directory: Sonic-Screwdriver
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('Sonic-Screwdriver/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: Sonic-Screwdriver/results.sarif
          checkout_path: ${{ github.workspace }}/Sonic-Screwdriver
          category: glua_check
